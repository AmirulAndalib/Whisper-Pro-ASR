name: CI Pipeline

on:
  push:
    branches:
      - main
      - feature/*
      - release/*
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Core Verification & Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      checks: write
    steps:
      - uses: actions/checkout@v5

      - name: Enforce Up-to-date Poetry Lock File
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "$PWD/pyproject.toml:/workspace/pyproject.toml" \
            -v "$PWD/poetry.lock:/workspace/poetry.lock" \
            -w /workspace \
            python:3.12-slim \
            /bin/bash -lc '
              export HOME=/tmp
              python -m pip install --quiet --user poetry==2.4.1
              python -m poetry config virtualenvs.create false
              if [ ! -f poetry.lock ] || ! python -m poetry check --lock; then
                echo "poetry.lock is missing or out of sync. Please run poetry lock locally and commit the changes."
                exit 1
              fi
            '

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Prepare Test Environment (Docker)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.test
          target: test
          load: true
          tags: whisper-pro-asr-test
          cache-from: type=gha,scope=whisper-pro-asr-test
          cache-to: type=gha,mode=max,scope=whisper-pro-asr-test

      - name: Orchestrate Test Suite (Integration)
        run: |
          mkdir -p assets reports
          chmod 0777 assets reports
          docker run --rm \
            -e CI=true \
            -v "$PWD/assets:/app/assets" \
            -v "$PWD/reports:/reports" \
            whisper-pro-asr-test /bin/bash -c "tests/run_suite.sh; TEST_EXIT_CODE=\$?; \
              [ -f coverage.xml ] && cp coverage.xml /reports/coverage.xml || true; \
              [ -f coverage_output.txt ] && cp coverage_output.txt /reports/coverage_output.txt || true; \
              [ -f complexity_output.txt ] && cp complexity_output.txt /reports/complexity_output.txt || true; \
              [ -f pytest.xml ] && cp pytest.xml /reports/pytest.xml || true; \
              exit \$TEST_EXIT_CODE"

      - name: Export Coverage & Complexity to Job Summary
        if: success() || failure()
        run: |
          {
            echo "### Code Coverage Summary"
            echo '```text'
            if [ -f reports/coverage_output.txt ]; then
              # Extract coverage report summary
              if grep -q "^------.*coverage" reports/coverage_output.txt; then
                sed -n '/^------.*coverage/,/^TOTAL/p' \
                  reports/coverage_output.txt
              else
                # Fallback: show last 30 lines containing coverage data
                tail -30 reports/coverage_output.txt | grep -E \
                  '(py$|TOTAL|^-+$)' || tail -30 \
                  reports/coverage_output.txt
              fi
            else
              echo "reports/coverage_output.txt not found"
            fi
            echo '```'
            echo "### Cyclomatic Complexity Summary"
            echo '```text'
            if [ -f reports/complexity_output.txt ]; then
              cat reports/complexity_output.txt
            else
              echo "reports/complexity_output.txt not found"
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Generate PR Coverage Comment
        if: success() || failure()
        uses: MishaKav/pytest-coverage-comment@v1
        with:
          pytest-coverage-path: ./reports/coverage_output.txt
          junitxml-path: ./reports/pytest.xml

      - name: Resolve Docker Metadata & Tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ventura8/whisper-pro-asr
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Authenticate to DockerHub
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Finalize & Push Production Image
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: |
            type=gha,scope=whisper-pro-asr-test
            type=gha,scope=whisper-pro-asr-production
          cache-to: type=gha,mode=max,scope=whisper-pro-asr-production
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Update Docker Hub Description
        if: >
          github.ref == 'refs/heads/main' ||
          startsWith(github.ref, 'refs/heads/release/') ||
          startsWith(github.ref, 'refs/tags/v')
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ventura8/whisper-pro-asr
          readme-filepath: ./docs/DOCKERHUB_DESCRIPTION.md
